<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Tesen Factory Admin</title>

  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/login.css" />
</head>
<body class="login-body">

  <main class="login-page">
    <section class="login-card">
      <div class="login-logo">
        <img src="./assets/img/logo-tesen.png" alt="Tesen Factory" />
      </div>

      <h1>Panel Administrativo</h1>
      <p>Ingresa con tu usuario asignado</p>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Correo</label>
          <input 
            type="email" 
            id="email" 
            placeholder="admin@tesen.com" 
            required 
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            placeholder="********" 
            required 
          />
        </div>

        <button type="submit" class="btn-primary">
          Iniciar sesión
        </button>

        <p id="loginError" class="form-error"></p>
      </form>
    </section>
  </main>

  <script type="module" src="./assets/js/pages/login.js"></script>
</body>
</html>
