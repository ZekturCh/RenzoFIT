<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Inventario | Tesen Factory Admin</title>

  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/inventario.css" />
</head>
<body>

  <aside id="sidebar" class="sidebar"></aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1>Inventario</h1>
        <p>Productos, stock y pendientes de aprobación</p>
      </div>

      <button id="openProductModalBtn" class="btn-primary">
        Agregar producto
      </button>
    </header>

    <section class="filters-bar">
      <input type="text" id="inventorySearch" placeholder="Buscar producto" />
    </section>

    <section class="panel-section admin-only">
      <h2>Pendientes de aprobación</h2>

      <div id="pendingProductsList" class="cards-list">
        <p class="empty-message">Cargando pendientes...</p>
      </div>
    </section>

    <section class="panel-section">
      <h2>Inventario aprobado</h2>

      <div class="table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Stock</th>
              <th class="admin-only">Precio compra</th>
              <th class="admin-only">Precio venta</th>
              <th class="admin-only">Acciones</th>
            </tr>
          </thead>

          <tbody id="inventoryTableBody">
            <tr>
              <td colspan="6">Cargando inventario...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="productModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeProductModal" class="modal-close">×</button>

      <h2>Producto</h2>

      <div class="form-group">
        <label>Nombre del producto</label>
        <input type="text" id="productName" />
      </div>

      <div class="form-group">
        <label>Categoría</label>
        <input type="text" id="productCategory" />
      </div>

      <div class="form-group">
        <label>Cantidad</label>
        <input type="number" id="productStock" min="0" value="1" />
      </div>

      <div class="form-group admin-only">
        <label>Precio compra</label>
        <input type="number" id="productPurchasePrice" min="0" step="0.01" />
      </div>

      <div class="form-group admin-only">
        <label>Precio venta</label>
        <input type="number" id="productSalePrice" min="0" step="0.01" />
      </div>

      <button id="saveProductBtn" class="btn-primary">
        Guardar producto
      </button>
    </div>
  </div>

  <script type="module" src="./assets/js/pages/inventario.js"></script>
</body>
</html>
