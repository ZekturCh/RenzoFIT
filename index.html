<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dashboard | Coach Admin</title>

  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
</head>
<body>

  <aside id="sidebar" class="sidebar"></aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1>Dashboard</h1>
        <p>Resumen rápido de estudiantes y sesiones.</p>
      </div>
    </header>

    <section class="stats-grid">
      <article class="stat-card">
        <span>Estudiantes activos</span>
        <strong id="activeStudents">0</strong>
      </article>

      <article class="stat-card">
        <span>Sesiones de hoy</span>
        <strong id="todaySessions">0</strong>
      </article>

      <article class="stat-card">
        <span>Pagos pendientes</span>
        <strong id="pendingPayments">0</strong>
      </article>

      <article class="stat-card">
        <span>Por terminar pack</span>
        <strong id="lowSessions">0</strong>
      </article>
    </section>

    <section class="panel-section">
      <h2>Próximas sesiones</h2>
      <div id="nextSessionsList" class="cards-list">
        <p class="empty-message">Cargando agenda...</p>
      </div>
    </section>
  </main>

  <script type="module" src="./assets/js/pages/dashboard.js"></script>
</body>
</html>
