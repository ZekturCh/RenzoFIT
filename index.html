<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dashboard | Tesen Factory Admin</title>

  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/dashboard.css" />
</head>
<body>

  <aside id="sidebar" class="sidebar"></aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1>Dashboard</h1>
        <p>Resumen general del taller</p>
      </div>
    </header>

    <section class="filters-bar">
      <button class="filter-btn active" data-filter="today">Hoy</button>
      <button class="filter-btn" data-filter="week">Semana</button>
      <button class="filter-btn" data-filter="month">Último mes</button>
    </section>

    <section class="dashboard-grid">
      <article class="stat-card">
        <span>Clientes totales</span>
        <strong id="totalClients">0</strong>
      </article>

      <article class="stat-card">
        <span>Producto más vendido</span>
        <strong id="topProduct">-</strong>
      </article>

      <article class="stat-card">
        <span>Stock más bajo</span>
        <strong id="lowStock">-</strong>
      </article>

      <article class="stat-card">
        <span>Servicio más antiguo sin atender</span>
        <strong id="oldestService">-</strong>
      </article>
    </section>

    <section class="panel-section">
      <h2>Servicios pendientes</h2>

      <div id="pendingServicesList" class="cards-list">
        <p class="empty-message">Cargando servicios...</p>
      </div>
    </section>
  </main>

  <script type="module" src="./assets/js/pages/dashboard.js"></script>
</body>
</html>
