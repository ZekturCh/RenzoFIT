<!-- agenda.html -->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Agenda | Coach Admin</title>

  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />

  <!-- Calendario bonito -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
</head>
<body>

  <aside id="sidebar" class="sidebar"></aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1>Agenda</h1>
        <p>Marca asistencia, falta o reprograma sesiones.</p>
      </div>
    </header>

    <section class="filters-bar">
      <div class="date-filter-box">
        <input id="agendaDate" type="text" placeholder="dd/mm/aaaa" />
        <p id="agendaDateLabel" class="date-label"></p>
      </div>

      <button id="todayBtn" class="btn-secondary">Hoy</button>
    </section>

    <section id="sessionsList" class="cards-list">
      <p class="empty-message">Cargando sesiones...</p>
    </section>
  </main>

  <div id="rescheduleModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeRescheduleModal" class="modal-close">×</button>

      <h2>Reprogramar sesión</h2>

      <div class="form-group">
        <label>Nueva fecha</label>
        <input id="newSessionDate" type="text" placeholder="dd/mm/aaaa" />
      </div>

      <div class="form-group">
        <label>Nueva hora</label>
        <input id="newSessionTime" type="text" placeholder="hh:mm" />
      </div>

      <button id="saveRescheduleBtn" class="btn-primary">
        Guardar cambio
      </button>
    </div>
  </div>

  <!-- Flatpickr -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

  <script type="module" src="./assets/js/pages/agenda.js"></script>
</body>
</html>
