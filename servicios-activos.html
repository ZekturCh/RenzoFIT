<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Servicios Activos | Tesen Factory Admin</title>

  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/servicios.css" />
</head>
<body>

  <aside id="sidebar" class="sidebar"></aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1>Servicios Activos</h1>
        <p>Diagnóstico, aprobación y checklist de trabajo</p>
      </div>
    </header>

    <section class="tabs-bar">
      <button class="tab-btn active" data-status="diagnosticando">Diagnosticando</button>
      <button class="tab-btn" data-status="listo_trabajar">Listo para trabajar</button>
    </section>

    <section id="activeServicesList" class="cards-list">
      <p class="empty-message">Cargando servicios...</p>
    </section>
  </main>

  <div id="serviceModal" class="modal hidden">
    <div class="modal-content large-modal">
      <button id="closeServiceModal" class="modal-close">×</button>

      <header class="modal-header">
        <h2 id="modalServiceTitle">Servicio</h2>
        <p id="modalServiceSubtitle">Cliente / Moto</p>
      </header>

      <section class="modal-section">
        <h3>Observaciones de ingreso</h3>
        <p id="modalObservations">-</p>
      </section>

      <section class="modal-section">
        <h3>Agregar hallazgo / item</h3>

        <div class="item-add-row">
          <input type="text" id="modalItemName" placeholder="Descripción" />
          <select id="modalItemType">
            <option value="service">Servicio</option>
            <option value="product">Producto</option>
          </select>
          <input type="number" id="modalItemQuantity" placeholder="Cant." min="1" value="1" />
          <input type="number" id="modalItemPrice" placeholder="Precio admin" min="0" step="0.01" />
          <button type="button" id="modalAddItemBtn" class="btn-secondary">Agregar</button>
        </div>
      </section>

      <section class="modal-section">
        <h3>Checklist / Items</h3>

        <div id="modalItemsList" class="checklist-list">
          <p class="empty-message">Sin items</p>
        </div>
      </section>

      <section class="modal-section admin-only">
        <h3>Resumen admin</h3>

        <div class="totals-box">
          <p>Total: <strong id="modalTotal">S/ 0.00</strong></p>
          <p>Anticipo: <strong id="modalAdvance">S/ 0.00</strong></p>
          <p>Saldo: <strong id="modalRemaining">S/ 0.00</strong></p>
        </div>
      </section>

      <footer class="modal-actions">
        <button id="downloadDiagnosticPdfBtn" class="btn-secondary admin-only">
          Descargar cotización
        </button>

        <button id="markReadyToWorkBtn" class="btn-primary admin-only">
          Pasar a listo para trabajar
        </button>

        <button id="finishWorkBtn" class="btn-primary">
          Terminar trabajo
        </button>
      </footer>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="./assets/js/pages/servicios-activos.js"></script>
</body>
</html>
